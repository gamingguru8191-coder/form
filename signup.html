<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System - Register</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Boxicons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <!-- CSS File -->
    <!-- <link rel="stylesheet" href="style.css"> -->
    <style>
        /* Your custom styles here */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #dfe9f3, #ffffff);
            min-height: 100vh;
            overflow-y: auto;
        }

        /* Container */
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 10px;
        }

        .logo h1 {
            font-size: 25px;
            color: #0d8ddb;
            font-weight: 700;
        }

        .logo p {
            color: #666;
            font-size: 15px;
        }

        /* Card */
        .card {
            width: 800px;
            max-width: 100%;
            background: #fff;
            min-height: 350px;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            margin: 10px;

        }

        /* Left Section */
        .left {
            width: 45%;
            background: #f8fbfd;
        }

        .left img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Right Section */
        .right {
            width: 55%;
            background: #eaf3f8;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .right h2 {
            text-align: center;
            font-size: 24px;
            color: #222;
            margin-bottom: 3px;
        }

        .right h2 span {
            color: #0d8ddb;
        }

        .right p {
            text-align: center;
            color: #666;
            margin-bottom: 10px;
            font-size: 13px;
        }

        /* Form Group */
        .form-group {
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
            font-weight: 500;
            color: #333;
        }

        .form-group label i {
            margin-right: 5px;
            color: #0d8ddb;
            font-size: 14px;
        }

        /* Inputs */
        input,
        select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #d6d6d6;
            border-radius: 8px;
            outline: none;
            font-size: 13px;
            background: #fff;
            transition: 0.3s ease;
        }

        input:focus,
        select:focus {
            border-color: #0d8ddb;
            box-shadow: 0 0 6px rgba(13, 141, 219, 0.2);
        }

        select {
            cursor: pointer;
        }

        /* Password */
        .password-box {
            position: relative;
        }

        .password-box input {
            padding-right: 40px;
        }

        .password-box i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #666;
            cursor: pointer;
            transition: 0.3s;
        }

        .password-box i:hover {
            color: #0d8ddb;
        }

        /* Checkbox */
        .check {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 8px 0;
        }

        .check input {
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        .check label {
            font-size: 13px;
            color: #444;
            cursor: pointer;
        }

        /* Button */
        .btn {
            width: 100%;
            border: none;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            background: linear-gradient(135deg, #1da1f2, #0d8ddb);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn i {
            margin-right: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(13, 141, 219, 0.25);
        }

        /* Login Link */
        .extra {
            margin-top: 10px;
            text-align: center;
            font-size: 13px;
            color: #555;
        }

        .extra a {
            color: #0d8ddb;
            text-decoration: none;
            font-weight: 600;
        }

        .extra a:hover {
            text-decoration: underline;
        }

        .extra i {
            margin-right: 4px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .card {
                width: 100%;
                max-width: 500px;
                flex-direction: column;
            }

            .left,
            .right {
                width: 100%;
            }

            .left {
                height: 220px;
            }

            .right {
                padding: 15px;
            }
        }

        @media (max-width: 480px) {
            .logo h1 {
                font-size: 20px;
            }

            .logo p {
                font-size: 11px;
            }

            .left {
                height: 180px;
            }

            .right h2 {
                font-size: 20px;
            }

            input,
            select,
            .btn {
                font-size: 12px;
            }

            .extra {
                font-size: 11px;
            }
        }
    </style>

</head>

<body>

    <div class="container">

        <!-- Logo -->
        <div class="logo">
            <h1>Library Management System</h1>
            <p>Smart Library, Better Tomorrow</p>
        </div>

        <!-- Register Card -->
        <div class="card">

            <!-- Left Side -->
            <div class="left">
                <img src="library-3.jpg" alt="Library Image">
            </div>

            <!-- Right Side -->
            <div class="right">

                <h2>Create Your <span>Account ?</span></h2>
                <p>Sign up to get started</p>

                <form action="#" method="post">

                    <!-- Full Name -->
                    <div class="form-group">
                        <label for="fullname">
                            <i class='bx bxs-user'></i>
                            Full Name
                        </label>
                        <input type="text" id="fullname" placeholder="Enter Your Full Name" required>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">
                            <i class='bx bxs-envelope'></i>
                            Email Address
                        </label>
                        <input type="email" id="email" placeholder="Enter Your Email" required>
                    </div>

                    <!-- Username -->
                    <div class="form-group">
                        <label for="username">
                            <i class='bx bxs-user-circle'></i>
                            Username
                        </label>
                        <input type="text" id="username" placeholder="Enter Username" required>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="password">
                            <i class='bx bxs-lock-alt'></i>
                            Password
                        </label>

                        <div class="password-box">
                            <input type="password" id="password" placeholder="Enter Password" required>
                            <i class='bx bx-show' id="togglePassword"></i>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-group">
                        <label for="confirmPassword">
                            <i class='bx bxs-lock-alt'></i>
                            Confirm Password
                        </label>

                        <div class="password-box">
                            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                            <i class='bx bx-show' id="toggleConfirmPassword"></i>
                        </div>
                    </div>

                    <!-- Terms -->
                    <div class="check">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">
                            I agree to the Terms & Conditions
                        </label>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn">
                        <i class='bx bx-user-plus'></i>
                        Sign Up
                    </button>

                    <!-- Login Link -->
                    <div class="extra">
                        Already have an account?
                        <a href="login.html">
                            <i class='bx bx-log-in'></i>
                            Login Now
                        </a>
                    </div>

                </form>

            </div>

        </div>

    </div>

    <script>
        const password = document.getElementById("password");
        const confirmPassword = document.getElementById("confirmPassword");

        const togglePassword = document.getElementById("togglePassword");
        const toggleConfirmPassword = document.getElementById("toggleConfirmPassword");

        togglePassword.addEventListener("click", () => {
            const type = password.type === "password" ? "text" : "password";
            password.type = type;

            togglePassword.classList.toggle("bx-show");
            togglePassword.classList.toggle("bx-hide");
        });

        toggleConfirmPassword.addEventListener("click", () => {
            const type = confirmPassword.type === "password" ? "text" : "password";
            confirmPassword.type = type;

            toggleConfirmPassword.classList.toggle("bx-show");
            toggleConfirmPassword.classList.toggle("bx-hide");
        });
    </script>

</body>

</html>
